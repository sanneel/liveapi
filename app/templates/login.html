<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Live Odds Management</title>

  <script>try{if(localStorage.getItem('jb-theme')==='dark')document.documentElement.classList.add('dark');}catch(e){}</script>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/static/redesign.css?v=10">
  <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    body { margin:0; min-height:100vh; background:var(--canvas); font-family:var(--font);
           display:flex; align-items:center; justify-content:center; padding:24px; }
    .auth-wrap { width:100%; max-width:392px; }
    .auth-logo { display:flex; align-items:center; justify-content:center; gap:11px; margin-bottom:22px; }
    .auth-logo .mark { width:34px; height:34px; border-radius:10px; background:var(--ac);
                       display:flex; align-items:center; justify-content:center; color:#fff; }
    .auth-logo .mark svg { width:20px; height:20px; }
    .auth-logo .word { font-size:17px; font-weight:800; letter-spacing:-.01em; color:var(--t-strong); }
    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:16px;
                 box-shadow:0 12px 40px rgba(16,24,40,.06); padding:28px; }
    .auth-title { margin:0 0 18px; font-size:18px; font-weight:800; letter-spacing:-.01em; color:var(--t-strong); }
    .auth-form { display:flex; flex-direction:column; gap:14px; }
    .auth-foot { text-align:center; font-size:11.5px; color:var(--t-faint2); margin-top:18px; }
  </style>
</head>

<body class="content-light">
  <div class="auth-wrap">
    <div class="auth-logo">
      <span class="mark"><i data-lucide="activity"></i></span>
      <span class="word">Live Odds Management</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Sign in</h1>

      {% if error %}<div class="alert err">{{ error }}</div>{% endif %}

      <form method="POST" action="/admin/login" class="auth-form">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="field">
          <span class="lbl">Username</span>
          <input class="input" type="text" name="username" required autofocus autocomplete="username">
        </div>
        <div class="field">
          <span class="lbl">Password</span>
          <input class="input" type="password" name="password" required autocomplete="current-password">
        </div>
        <button class="btn primary" type="submit" style="justify-content:center; margin-top:4px">Sign in</button>
      </form>
    </div>

    <p class="auth-foot">Protected admin area. All actions are logged.</p>
  </div>

  <script>document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });</script>
</body>
</html>
