<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ theme.display_name }} · Cube</title>
  <meta property="og:title" content="{{ theme.display_name }}" />
  <meta property="og:image" content="/cube/{{ theme.slug }}.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, #1a1f2c 0%, #07080b 80%);
      color: #e7e9ee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      gap: 18px;
    }
    .stage {
      width: min(600px, 90vw);
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 28px 70px -20px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.04);
      background: #000;
    }
    .stage img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity .35s ease;
    }
    .stage img.swap { opacity: 0; }
    h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .meta {
      color: #8a93a3;
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .links {
      display: flex;
      gap: 14px;
      margin-top: 4px;
      font-size: 12px;
      color: #8a93a3;
    }
    .links a { color: #b6c1d2; text-decoration: none; border-bottom: 1px dashed #3a4255; }
    .links a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="meta">{{ theme.subtitle }}</div>
    <h1>{{ theme.display_name }}</h1>
    <div class="stage">
      <img id="cube" src="/cube/{{ theme.slug }}.png" alt="{{ theme.display_name }}" />
    </div>
    <div class="links">
      <a href="/cube/{{ theme.slug }}.png" target="_blank">PNG</a>
      <a href="/cube">All themes</a>
    </div>
  </div>

  <script>
    // Reload the PNG on the same interval as parser cycles (~30s buffer
    // under the 120s parser cycle) so the displayed cube tracks live odds
    // without a full page reload. ETag/304 keeps this cheap.
    (function () {
      const img = document.getElementById('cube');
      const base = '/cube/{{ theme.slug }}.png';
      const intervalMs = 30000;
      setInterval(function () {
        img.classList.add('swap');
        const next = new Image();
        const url = base + '?t=' + Date.now();
        next.onload = function () {
          img.src = url;
          img.classList.remove('swap');
        };
        next.onerror = function () {
          img.classList.remove('swap');
        };
        next.src = url;
      }, intervalMs);
    })();
  </script>
</body>
</html>
