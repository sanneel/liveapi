<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ theme.display_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /*
      Scene: perspective container.
      Face ratio matches media-cub-template (420×380 = 1.105:1).
      Capped at 300px wide so it looks like an ad unit — not full-screen —
      when visited directly in a browser. Shrinks to fit smaller iframes.
    */
    .scene {
      --face-w: min(90vmin, 300px);
      width:    var(--face-w);
      height:   calc(var(--face-w) / 1.105);
      perspective: calc(var(--face-w) * 3);
    }

    /* The rotating box. 4 faces, 90° apart around Y-axis. */
    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: spin 9s linear infinite;
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(-360deg); }
    }

    .face {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      backface-visibility: hidden;
      /* translateZ set by JS once we know the rendered width */
    }

    .face img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      /* Prevent broken-image icons while loading */
      background: #0a0e1a;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="cube" id="cube">
      <!--
        4 faces, alternating: promo → odds → promo → odds.
        The two odds faces stay in sync — both show the currently-active
        match slot. Every SLOT_INTERVAL_MS, both odds <img>s swap to the
        next slot.
      -->
      <div class="face" id="f0">
        <img src="{{ theme.promo_image_url }}" alt="" />
      </div>
      <div class="face" id="f1">
        <img id="odds-a" src="/cube/{{ theme.slug }}/odds.png?slot=0" alt="" />
      </div>
      <div class="face" id="f2">
        <img src="{{ theme.promo_image_url }}" alt="" />
      </div>
      <div class="face" id="f3">
        <img id="odds-b" src="/cube/{{ theme.slug }}/odds.png?slot=0" alt="" />
      </div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    var THEME             = "{{ theme.slug }}";
    // How long each slot stays on-screen before cycling to the next.
    // Requested cadence: 20 s per slot.
    var SLOT_INTERVAL_MS  = 20000;
    // How often to silently re-pull the same slot so live odds tick over.
    var REFRESH_INTERVAL_MS = 30000;

    var scene   = document.getElementById('scene');
    var cube    = document.getElementById('cube');
    var faces   = cube.querySelectorAll('.face');
    var oddsA   = document.getElementById('odds-a');
    var oddsB   = document.getElementById('odds-b');
    var N       = faces.length;            // 4 (geometry)
    var step    = 360 / N;                 // 90°

    function layout() {
      /* translateZ = half the face width — makes a perfect square prism. */
      var tz = scene.clientWidth / 2;
      for (var i = 0; i < N; i++) {
        faces[i].style.transform =
          'rotateY(' + (i * step) + 'deg) translateZ(' + tz + 'px)';
      }
    }

    layout();
    window.addEventListener('resize', layout);

    /*
      Slot cycling state.

      slotCount: how many match slots the theme has. Discovered from the
      first /data.json response — keeps the widget self-configuring so we
      don't have to template a Python list of slot indices into JS.

      currentSlot: which slot is currently rendered in the odds <img>s.
      Advances 0 → 1 → ... → slotCount-1 → 0 every SLOT_INTERVAL_MS.
    */
    var slotCount = 1;
    var currentSlot = 0;

    function setOddsSlot(slot) {
      var url = '/cube/' + THEME + '/odds.png?slot=' + slot + '&t=' + Date.now();
      oddsA.src = url;
      oddsB.src = url;
    }

    function advanceSlot() {
      if (slotCount <= 1) return;
      currentSlot = (currentSlot + 1) % slotCount;
      setOddsSlot(currentSlot);
    }

    function refreshCurrentSlot() {
      // Re-fetch the same slot to pick up live odds changes between
      // rotations. Cache-bust on the URL forces a fresh request even
      // though the slot index didn't change.
      setOddsSlot(currentSlot);
    }

    function discoverSlotCount() {
      // /data.json includes one entry per face the theme defines; count
      // the match-kind faces. Done once at boot, retried on next interval
      // if the request fails (so a transient parser hiccup doesn't strand
      // the widget on slot 0 forever).
      fetch('/cube/' + THEME + '/data.json', { credentials: 'omit' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (!data || !Array.isArray(data.faces)) return;
          var matchFaces = data.faces.filter(function (f) { return f && f.kind === 'match'; });
          var n = matchFaces.length;
          if (n > 0 && n !== slotCount) {
            slotCount = n;
            currentSlot = Math.min(currentSlot, slotCount - 1);
          }
        })
        .catch(function () { /* silent — keep slotCount as-is */ });
    }

    // Boot sequence.
    setOddsSlot(0);
    discoverSlotCount();
    // Rediscover periodically so adding/removing a slot in cube_themes.py
    // takes effect without forcing every embedded widget to be reloaded.
    setInterval(discoverSlotCount, 5 * 60 * 1000);

    setInterval(advanceSlot, SLOT_INTERVAL_MS);
    setInterval(refreshCurrentSlot, REFRESH_INTERVAL_MS);
  })();
  </script>
</body>
</html>
