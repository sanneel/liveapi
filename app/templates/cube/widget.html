<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ theme.display_name }} · Cube Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* ── Reset for iframe embedding ───────────────────────────────── */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 3D cube scene ────────────────────────────────────────────── */
    .scene {
      width: 100%;
      height: 100%;
      perspective: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The cube container. Edge length = min(width, height) of viewport,
       computed in JS so the cube scales with the iframe. */
    .cube {
      position: relative;
      transform-style: preserve-3d;
      transition: transform 900ms cubic-bezier(.25, .8, .25, 1);
      will-change: transform;
    }

    /* Each face is absolutely positioned and rotated to its slot on
       a 4-sided rotation around the Y axis. translateZ(half) pushes it
       outward to form the cube surface. The widget rotates around Y
       only — top/bottom faces aren't used (matches the reference
       video, which never shows them). */
    .face {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      box-sizing: border-box;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 18px 50px -18px rgba(0, 0, 0, .55),
                  0 0 0 1px rgba(255, 255, 255, .06);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px;
      text-align: center;
    }

    /* ── Brand face ─────────────────────────────────────────────── */
    .brand {
      gap: 8px;
    }
    .brand .label {
      font-weight: 900;
      font-style: italic;
      letter-spacing: .04em;
      font-size: clamp(22px, 7.5vmin, 44px);
      line-height: 1;
      text-shadow: 0 2px 14px rgba(0, 0, 0, .35);
    }
    .brand .underline {
      width: 60%;
      max-width: 140px;
      height: 3px;
      border-radius: 2px;
    }
    .brand .sublabel {
      font-weight: 600;
      font-size: clamp(9px, 2.6vmin, 13px);
      letter-spacing: .14em;
      opacity: .85;
    }

    /* ── Match face ─────────────────────────────────────────────── */
    .match {
      gap: 6px;
      justify-content: space-between;
      padding: 12px 12px 10px;
    }
    .match .badge {
      align-self: center;
      font-size: clamp(8px, 2.4vmin, 11px);
      font-weight: 800;
      letter-spacing: .14em;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .35);
    }
    .match .badge.live {
      background: #d9162e;
      color: #fff;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217, 22, 46, .55); }
      50%      { box-shadow: 0 0 0 6px rgba(217, 22, 46, 0); }
    }
    .match .teams {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      justify-content: center;
    }
    .match .team {
      font-weight: 800;
      font-size: clamp(11px, 3.6vmin, 18px);
      line-height: 1.1;
    }
    .match .vs {
      font-style: italic;
      font-weight: 900;
      font-size: clamp(10px, 3vmin, 14px);
      opacity: .85;
    }
    .match .score {
      font-weight: 900;
      font-size: clamp(14px, 4.2vmin, 22px);
      letter-spacing: .05em;
    }
    .match .odds {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      width: 100%;
    }
    .match .odd {
      background: rgba(0, 0, 0, .35);
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 6px;
      padding: 4px 0 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.05;
    }
    .match .odd .k {
      font-size: clamp(7px, 1.9vmin, 9px);
      opacity: .7;
      letter-spacing: .05em;
    }
    .match .odd .v {
      font-weight: 800;
      font-size: clamp(11px, 3.2vmin, 16px);
    }

    /* Empty / placeholder state */
    .empty {
      font-size: clamp(10px, 3vmin, 13px);
      opacity: .75;
      padding: 0 12px;
    }

    /* Bottom-left tournament caption on match face */
    .match .caption {
      font-size: clamp(8px, 2.2vmin, 10px);
      opacity: .65;
      letter-spacing: .04em;
    }

    /* No-JS fallback: show only the first face flat. */
    .nojs .cube .face:not(:first-child) { display: none; }
    .nojs .cube { transform: none !important; }
  </style>
</head>
<body class="nojs">
  <div class="scene">
    <div class="cube" id="cube" aria-label="{{ theme.display_name }}">
      <!-- Faces injected by JS so theme registry stays single-source-of-truth -->
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    document.body.classList.remove('nojs');

    var themeSlug = "{{ theme.slug }}";
    var ROTATE_INTERVAL_MS = 3500;   // ~3.5s per face like the reference widget
    var POLL_INTERVAL_MS = 30000;    // refresh data every 30s (parser cycle is 120s)
    var cubeEl = document.getElementById('cube');
    var sceneEl = document.querySelector('.scene');

    // ── Sizing ──────────────────────────────────────────────────
    function edge() {
      // Cube edge = smaller viewport dimension minus a small bezel so
      // shadow + perspective have breathing room. The iframe host
      // controls the outer size; we honor whatever it gives us.
      var w = sceneEl.clientWidth || 240;
      var h = sceneEl.clientHeight || 240;
      return Math.max(80, Math.min(w, h) - 16);
    }

    function layout(facesCount) {
      var e = edge();
      cubeEl.style.width = e + 'px';
      cubeEl.style.height = e + 'px';
      // 4-face cube: 90° apart. For 3 faces we'd use 120°, etc.
      var step = 360 / Math.max(1, facesCount);
      // translateZ = edge/2 / tan(step/2 rad). For 4 faces, step/2=45° => edge/2.
      var rad = (step / 2) * Math.PI / 180;
      var tz = (e / 2) / Math.tan(rad);
      var faces = cubeEl.querySelectorAll('.face');
      for (var i = 0; i < faces.length; i++) {
        var rotY = i * step;
        faces[i].style.transform = 'rotateY(' + rotY + 'deg) translateZ(' + tz + 'px)';
      }
      // Center camera so face #0 fills the viewport: pull back by tz.
      cubeEl.style.transform = 'translateZ(' + (-tz) + 'px) rotateY(' + currentRotY + 'deg)';
    }

    // ── Rendering ───────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
      });
    }

    function brandFaceHtml(face) {
      return ''
        + '<div class="face brand" style="background:' + face.bg + ';color:' + face.fg + '">'
        +   '<div class="label">' + escapeHtml(face.label) + '</div>'
        +   '<div class="underline" style="background:' + face.accent + '"></div>'
        +   '<div class="sublabel">' + escapeHtml(face.sublabel) + '</div>'
        + '</div>';
    }

    function oddHtml(k, v) {
      return ''
        + '<div class="odd">'
        +   '<div class="k">' + escapeHtml(k) + '</div>'
        +   '<div class="v">' + escapeHtml(v == null ? '-' : v) + '</div>'
        + '</div>';
    }

    function matchFaceHtml(face) {
      var m = face.match;
      if (!m) {
        return ''
          + '<div class="face match" style="background:' + face.bg + ';color:' + face.fg + '">'
          +   '<div class="empty">Awaiting in-scope matches</div>'
          + '</div>';
      }
      var liveBadge = m.is_live
        ? '<div class="badge live">LIVE</div>'
        : '<div class="badge">' + escapeHtml(m.time || 'PRÓX.') + '</div>';
      var scoreOrVs = (m.is_live && m.score && m.score.home != null && m.score.away != null)
        ? '<div class="score">' + m.score.home + ' - ' + m.score.away + '</div>'
        : '<div class="vs">VS</div>';
      var odds = m.odds || {};
      return ''
        + '<div class="face match" style="background:' + face.bg + ';color:' + face.fg + '">'
        +   liveBadge
        +   '<div class="teams">'
        +     '<div class="team">' + escapeHtml(m.home) + '</div>'
        +     scoreOrVs
        +     '<div class="team">' + escapeHtml(m.away) + '</div>'
        +   '</div>'
        +   '<div class="odds">'
        +     oddHtml('1', odds.p1)
        +     oddHtml('X', odds.draw)
        +     oddHtml('2', odds.p2)
        +   '</div>'
        + '</div>';
    }

    function renderFaces(faces) {
      var html = '';
      for (var i = 0; i < faces.length; i++) {
        html += (faces[i].kind === 'brand' ? brandFaceHtml(faces[i]) : matchFaceHtml(faces[i]));
      }
      cubeEl.innerHTML = html;
      layout(faces.length);
    }

    // ── State ──────────────────────────────────────────────────
    var currentRotY = 0;          // never resets — keeps rotating smoothly
    var currentFaceIdx = 0;
    var facesCount = 0;
    var step = 90;                 // updated to match faces count

    function rotateNext() {
      currentFaceIdx = (currentFaceIdx + 1) % Math.max(1, facesCount);
      currentRotY -= step;         // negative = rotates left → next face faces camera
      // Re-apply the transform (preserve translateZ pullback).
      var e = edge();
      var rad = (step / 2) * Math.PI / 180;
      var tz = (e / 2) / Math.tan(rad);
      cubeEl.style.transform = 'translateZ(' + (-tz) + 'px) rotateY(' + currentRotY + 'deg)';
    }

    // ── Data fetch ─────────────────────────────────────────────
    function fetchData() {
      var url = '/cube/' + themeSlug + '/data.json?t=' + Date.now();
      return fetch(url, { credentials: 'omit' })
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
    }

    function applyPayload(p) {
      facesCount = p.faces.length;
      step = 360 / Math.max(1, facesCount);
      renderFaces(p.faces);
    }

    // ── Boot ───────────────────────────────────────────────────
    fetchData()
      .then(applyPayload)
      .catch(function (e) {
        cubeEl.innerHTML = '<div class="face brand" style="background:#222;color:#fff">'
          + '<div class="label">…</div><div class="sublabel">' + escapeHtml(e.message) + '</div></div>';
      });

    // Rotation tick. Starts after the first paint.
    setInterval(function () {
      if (facesCount > 1) rotateNext();
    }, ROTATE_INTERVAL_MS);

    // Live odds tick. ETag/304 keeps this cheap.
    setInterval(function () {
      fetchData().then(applyPayload).catch(function () { /* keep last good state */ });
    }, POLL_INTERVAL_MS);

    // Re-layout on iframe resize (host may change width/height).
    window.addEventListener('resize', function () {
      if (facesCount > 0) layout(facesCount);
    });
  })();
  </script>
</body>
</html>
