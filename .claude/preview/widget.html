<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cube Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene {
      width:  min(100vw, calc(100vh * 1.105));
      height: min(100vh, calc(100vw / 1.105));
      perspective: 900px;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: spin 9s linear infinite;
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(-360deg); }
    }

    .face {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      backface-visibility: hidden;
    }

    .face img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      background: #0a0e1a;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="cube" id="cube">
      <div class="face" id="f0"><img src="cube-ucl.jpg" alt="" /></div>
      <div class="face" id="f1"><img src="render_output.png" alt="" /></div>
      <div class="face" id="f2"><img src="cube-ucl.jpg" alt="" /></div>
      <div class="face" id="f3"><img src="render_output.png" alt="" /></div>
    </div>
  </div>

  <script>
  (function () {
    var scene = document.getElementById('scene');
    var cube  = document.getElementById('cube');
    var faces = cube.querySelectorAll('.face');
    var N     = faces.length;
    var step  = 360 / N;

    function layout() {
      var tz = scene.clientWidth / 2;
      for (var i = 0; i < N; i++) {
        faces[i].style.transform =
          'rotateY(' + (i * step) + 'deg) translateZ(' + tz + 'px)';
      }
    }

    layout();
    window.addEventListener('resize', layout);
  })();
  </script>
</body>
</html>
